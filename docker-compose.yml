
services:
  # MySQL 8 Database
  db:
    image: mysql:8.0
    container_name: pma-dtr-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pma-network

  # Express API Server 
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pma-dtr-server
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      SESSION_SECRET: ${SESSION_SECRET}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME}
      CLIENT_URL: ${CLIENT_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pma-network

 
  # React Frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: pma-dtr-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - server
    networks:
      - pma-network

volumes:
  db_data:

networks:
  pma-network:
    driver: bridge
